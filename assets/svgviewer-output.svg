<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- 'ARISE' Text Gradient (Sun/Horizon vibe) -->
    <linearGradient id="arise-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff3366" />
      <stop offset="50%" stop-color="#ff6b35" />
      <stop offset="100%" stop-color="#ffcf33" />
    </linearGradient>

    <!-- 'SCHEDULE' Text Gradient -->
    <linearGradient id="sched-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>

    <!-- Glowing effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Abstract Rising Sun / Geometric Schedule Grid Background -->
  <g opacity="0.25">
    <!-- Concentric Sunrise Rings -->
    <circle cx="400" cy="180" r="120" fill="none" stroke="#ff6b35" stroke-width="1" stroke-dasharray="4 8" />
    <circle cx="400" cy="180" r="160" fill="none" stroke="#ffcf33" stroke-width="1" />
    <circle cx="400" cy="180" r="220" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="15 5" />
    
    <!-- Dynamic 'Growth' Lines -->
    <line x1="400" y1="180" x2="200" y2="30" stroke="#ff3366" stroke-width="1.5" />
    <line x1="400" y1="180" x2="600" y2="30" stroke="#ffcf33" stroke-width="1.5" />
    <line x1="400" y1="180" x2="100" y2="180" stroke="#38bdf8" stroke-width="1" />
    <line x1="400" y1="180" x2="700" y2="180" stroke="#38bdf8" stroke-width="1" />
  </g>

  <!-- Central Logo Mark: The Rising Calendar/Phoenix -->
  <g transform="translate(0, -10)">
    <!-- Ambient Glow Behind Icon -->
    <circle cx="400" cy="115" r="35" fill="#ff6b35" opacity="0.3" filter="url(#soft-glow)" />

    <!-- Background Sun of the Icon -->
    <circle cx="400" cy="120" r="30" fill="url(#arise-grad)" />

    <!-- Upward 'Rising' Data Bars / Calendar Columns -->
    <!-- Bar 1 (Left) -->
    <rect x="365" y="110" width="12" height="30" rx="4" fill="#ffffff" opacity="0.8" />
    <!-- Bar 2 (Center - Rising Higher) -->
    <rect x="382" y="90" width="12" height="50" rx="4" fill="#ffffff" filter="url(#glow)" />
    <!-- Bar 3 (Right - Highest/Arrow peak) -->
    <rect x="399" y="75" width="12" height="65" rx="4" fill="#ffffff" filter="url(#glow)" />
    <!-- Bar 4 (Far Right) -->
    <rect x="416" y="100" width="12" height="40" rx="4" fill="#ffffff" opacity="0.9" />

    <!-- Crisp Dynamic Arrow cutting through -->
    <path d="M 350 145 L 405 85 L 415 95 L 360 155 Z" fill="#38bdf8" opacity="0.7" />
    <path d="M 385 75 L 425 75 L 425 115 Z" fill="#ffffff" filter="url(#glow)" />
  </g>

  <!-- Typography Section -->
  <!-- 'ARISE' - Bold, modern, energetic -->
  <text x="400" y="245" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-weight="900" 
        font-size="72" 
        fill="url(#arise-grad)" 
        text-anchor="middle" 
        letter-spacing="12"
        filter="url(#glow)">ARISE</text>

  <!-- 'SCHEDULE' - Clean, precise, tracked out -->
  <text x="400" y="295" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-weight="500" 
        font-size="24" 
        fill="url(#sched-grad)" 
        text-anchor="middle" 
        letter-spacing="18">SCHEDULE</text>

  <!-- Subtle UI Accent Line below -->
  <rect x="350" y="320" width="100" height="3" rx="1.5" fill="#38bdf8" opacity="0.6" />
</svg>
